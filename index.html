<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Meal Picker</title>
</head>
<body>
    <h1>Weekly Meal Picker</h1>
    <div id="meal-picker">
        <label for="day">Choose a day:</label>
        <select id="day">
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
            <option value="Sunday">Sunday</option>
        </select>
        <button id="pick-meal">Pick Meal</button>
        <p id="meal-output"></p>
    </div>

    <script>
        const meals = {
            "Monday": "Chicken Salad",
            "Tuesday": "Taco Tuesday",
            "Wednesday": "Pasta Primavera",
            "Thursday": "Grilled Salmon",
            "Friday": "Pizza",
            "Saturday": "Burgers",
            "Sunday": "Roast Dinner"
        };

        document.getElementById('pick-meal').addEventListener('click', () => {
            const selectedDay = document.getElementById('day').value;
            const meal = meals[selectedDay];
            document.getElementById('meal-output').innerText = `Meal for ${selectedDay}: ${meal}`;
        });
    </script>
</body>
</html>
